services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartpark
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpark_secret}
      POSTGRES_DB: smartpark
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpark"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (with management UI) ─────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smartpark}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-smartpark_secret}
      RABBITMQ_PLUGINS: rabbitmq_management,rabbitmq_mqtt
    ports:
      - "5672:5672"    # AMQP protocol
      - "1884:1883"    # MQTT protocol (for ESP32 devices)
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── pgAdmin 4 (DB inspector) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@smartpark.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ── SmartPark Backend ─────────────────────────────────────
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://smartpark:${POSTGRES_PASSWORD:-smartpark_secret}@postgres:5432/smartpark
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-smartpark}:${RABBITMQ_PASS:-smartpark_secret}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  rabbitmqdata:
  pgadmindata:
